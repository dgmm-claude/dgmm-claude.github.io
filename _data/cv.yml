cv:
  name: 郑皓文 Haowen Zheng
  label: 机器人工程本科生 / Robotics Engineering Undergraduate
  email: 20231076@stu.cqu.edu.cn
  location: 重庆大学 · 国家卓越工程师学院
  image: ""
  summary: >
    重庆大学国家卓越工程师学院机器人工程专业大三本科生，专业排名第 5（前 10%），GPA 3.697，CET-6 570。
    围绕机器人系统集成与嵌入式系统开发两条主线，具备从数学建模、算法设计、嵌入式固件、PCB 硬件到系统集成测试的全链路工程能力。
    科研兴趣聚焦机器人「感知—估计—控制」闭环。

  social_networks:
    - network: GitHub
      username: dgmm-claude

  sections:
    Education:
      - institution: 重庆大学 国家卓越工程师学院
        location: 重庆
        url: https://eie.cqu.edu.cn/
        area: 机器人工程
        studyType: 本科 (Undergraduate)
        start_date: 2023
        end_date: 2027 (预计)
        score: "GPA 3.697 / 专业排名 5 (前 10%)"
        courses: "自动控制原理、信号与系统、嵌入式系统、工程数值分析、工程制造、微电路系统设计、数学物理方法"
        highlights:
          - CET-4 598，CET-6 570。

    Experience:
      - company: 宇树 G1 人形机器人上肢 IMU 遥操系统
        position: 项目核心开发者（国家级重大项目在申）
        url: /projects/1_unitree_g1_teleop/
        start_date: 2025-12
        end_date: 至今
        summary: >
          「感知—估计—控制—安全」完整闭环：VQF 九轴姿态融合 + 混合解析-优化逆运动学，实时遥操宇树 G1 上肢。约 5000 行代码，11 篇技术文档，2 项发明专利交底书。
        highlights:
          - 感知层全换自研 ESP32-C3 + ICM-20948 无线节点（替代 WT901C485 成品，WiFi/UDP + 本地 VQF，已开源）。
          - 静态精度 3.83 mm，手臂长度约束径向误差 0.40 mm；ORB-SLAM3 视觉惯性系统交叉验证。
          - 在 Isaac Lab 中以贝叶斯优化（GP+EI，448 次仿真）整定 14 关节 PD 初值，量化 Sim-to-Real Gap。
          - 实机硬件保护异常诊断（总误差标定 + 逐关节归因 + PyBullet 复现）→ 动态软件限位修复。
          - 设计 3 秒侧平举一次校准、6 坐标系统一管理、7 个单元测试覆盖全链路自洽性。

      - company: 视觉精确制导飞行系统（国家级大创）
        position: 项目主持人 / 结题优秀
        url: /projects/3_vision_guidance/
        start_date: 2024
        end_date: 2026
        summary: >
          第十九届国家级大学生创新训练项目，主持。负责视觉上位机软件与硬件（PCB）。
        highlights:
          - 双级视觉制导方案，命中精度提升 42.3%。
          - 国创结题评定优秀（项目编号 202510611294）。

      - company: SpeedyBot 低成本自主扫地机器人
        position: 组长 / 全栈开发
        url: /projects/4_speedybot/
        start_date: 2025
        end_date: 2025
        summary: ESP32-S3 + ROS2 Humble + Cartographer + Nav2 全栈，含 PCB、固件、上位机、Web 界面，86 页技术报告。

      - company: ESP32 无线 IMU 节点 & FC2203S 开源驱动
        position: 独立开发者 / 开源
        url: /projects/6_wireless_imu/
        start_date: 2025
        end_date: 2026
        summary: >
          独立完成无线九轴 IMU 节点（ESP32-C3 + ICM-20948 + VQF，WiFi/UDP，OTA，开源），已用于宇树 G1 遥操系统替代 WT901C485 成品模块；另含 FC2203S 电机半桥驱动开源硬件（GPL-3.0）。
        highlights:
          - 完整硬件、固件、上位机已开源。

      - company: ORB-SLAM3 末端位姿评估系统
        position: 独立完成 / 交叉验证真值系统
        url: /projects/2_orbslam3_pose/
        start_date: 2026-03
        end_date: 2026-03
        summary: >
          RealSense D435i + ORB-SLAM3 作独立外部真值，与遥操系统双 IMU 方案逐项交叉对比，划清两技术路线适用边界。
        highlights:
          - 静态 σ_3D_RMS 0.373 mm（亚毫米级）；五类量化评估 + IMU/SLAM 对比表。

      - company: PCB 焊垫热传导特性研究
        position: 数学物理方法课程综合项目（独立）
        url: /projects/9_pcb_thermal/
        start_date: 2026-01
        end_date: 2026-02
        summary: >
          PDE 建模 + 自研 Python FEM + ANSYS + 实物实验三方交叉验证，7 章 3229 行文档。
        highlights:
          - 热孔使时间常数 45.3 s → 8.2 s（5.5×）；自研 FEM 与 ANSYS 对标误差 <2%。

      - company: 非圆齿轮手摇发电机效率优化
        position: 工程制造课程项目
        url: /projects/10_noncircular_gear/
        start_date: 2026-04
        end_date: 2026-05
        summary: >
          实测数据驱动非圆齿轮节曲线优化 + 参数化 DXF 生成 + 3D 打印样件验证。
        highlights:
          - 效率波动缩小 ~73%，最低效率 85.67% → 92.86%（+7.19 pp）。

      - company: 工程数值分析（方程求根与结构模态）
        position: 课程大作业
        url: /projects/12_numerical_analysis/
        start_date: 2026-05
        end_date: 2026-05
        summary: >
          非线性求根（GA/PSO）+ 多自由度结构模态与地震响应（SOR / 反幂法 / RK4）。
        highlights:
          - SOR 最优 ω≈1.65 使迭代 552 → 105 次；RK4 地震响应误差 0.13 mm。

    Honors and Awards:
      - title: 国家级大学生创新训练计划《基于视觉的精确制导飞行系统研究》结题优秀
        summary: 国家级，2025
      - title: 全国大学生机器人大赛 RoboMaster 2025 全国赛三等奖
        summary: 国家级，2025
      - title: RoboMaster 2025 中部赛区区域赛二等奖
        summary: 省级，2025
      - title: 全国大学生电子设计竞赛重庆大学校赛一等奖
        summary: 校级，2025
      - title: 中国大学生工程实践与创新能力大赛校赛铜奖
        summary: 校级，2024

    Skills:
      - name: 编程语言
        summary: Python, C/C++, MATLAB, Verilog, JavaScript
      - name: 机器人与算法
        summary: VQF 姿态融合, ORB-SLAM3, 逆运动学, 卡尔曼滤波, Isaac Lab, 贝叶斯优化, Modbus RTU, OpenGL/PyBullet
      - name: 嵌入式与硬件
        summary: ESP32/STM32 (ESP-IDF/HAL), ICM-20948/WT901 IMU, PCB 设计 (立创 EDA), 信号完整性
      - name: 工程与仿真
        summary: SolidWorks, ANSYS, MuJoCo, Git, Linux, Docker

