cv:
  name: 郑皓文 Haowen Zheng
  label: 机器人工程本科生 / Robotics Engineering Undergraduate
  email: your-email@cqu.edu.cn
  location: 重庆大学 · 国家卓越工程师学院
  image: ""
  summary: >
    重庆大学国家卓越工程师学院机器人工程专业大三本科生，专业排名第 5（前 10%），GPA 3.697，CET-6 570。
    围绕机器人系统集成与嵌入式系统开发两条主线，具备从数学建模、算法设计、嵌入式固件、PCB 硬件到系统集成测试的全链路工程能力。
    科研兴趣聚焦机器人「感知—估计—控制」闭环。

  social_networks:
    - network: GitHub
      username: dgmm-claude

  sections:
    Education:
      - institution: 重庆大学 国家卓越工程师学院
        location: 重庆
        url: https://eie.cqu.edu.cn/
        area: 机器人工程
        studyType: 本科 (Undergraduate)
        start_date: 2023
        end_date: 2027 (预计)
        score: "GPA 3.697 / 专业排名 5 (前 10%)"
        courses: "自动控制原理、信号与系统、嵌入式系统、工程数值分析、工程制造、微电路系统设计、数学物理方法"
        highlights:
          - CET-4 598，CET-6 570。

    Experience:
      - company: 宇树 G1 人形机器人上肢 IMU 遥操系统
        position: 项目核心开发者（国家级重大项目在申）
        url: /projects/1_unitree_g1_teleop/
        start_date: 2025-12
        end_date: 至今
        summary: >
          「感知—估计—控制—安全」完整闭环：VQF 九轴姿态融合 + 混合解析-优化逆运动学，实时遥操宇树 G1 上肢。约 5000 行代码，11 篇技术文档，2 项发明专利交底书。
        highlights:
          - 静态精度 3.83 mm，手臂长度约束径向误差 0.40 mm；ORB-SLAM3 视觉惯性系统交叉验证。
          - 在 Isaac Lab 中以贝叶斯优化（GP+EI，448 次仿真）整定 14 关节 PD 初值，量化 Sim-to-Real Gap。
          - 实机硬件保护异常诊断（总误差标定 + 逐关节归因 + PyBullet 复现）→ 动态软件限位修复。
          - 设计 3 秒侧平举一次校准、6 坐标系统一管理、7 个单元测试覆盖全链路自洽性。

      - company: 视觉精确制导飞行系统（国家级大创）
        position: 项目主持人 / 结题优秀
        url: /projects/3_vision_guidance/
        start_date: 2024
        end_date: 2026
        summary: >
          第十九届国家级大学生创新训练项目，主持。负责视觉上位机软件与硬件（PCB）。
        highlights:
          - 双级视觉制导方案，命中精度提升 42.3%。
          - 国创结题评定优秀（项目编号 202510611294）。

      - company: SpeedyBot 低成本自主扫地机器人
        position: 组长 / 全栈开发
        url: /projects/4_speedybot/
        start_date: 2025
        end_date: 2025
        summary: ESP32-S3 + ROS2 Humble + Cartographer + Nav2 全栈，含 PCB、固件、上位机、Web 界面，86 页技术报告。

      - company: ESP32 无线 IMU 节点 & FC2203S 开源驱动
        position: 独立开发者 / 开源
        url: /projects/6_wireless_imu/
        start_date: 2025
        end_date: 2026
        summary: >
          独立完成无线九轴 IMU 节点（ESP32-C3 + ICM-20948 + VQF，WiFi/UDP，OTA，开源）与 FC2203S 电机半桥驱动开源硬件（GPL-3.0）。
        highlights:
          - 完整硬件、固件、上位机已开源。

    Honors and Awards:
